# configs/default.yaml
# ====================================================================
# MedVLM-AD — Default Experiment Configuration
# ====================================================================

data:
  raw_root:        "data/raw"
  processed_root:  "data/processed"
  img_size:        224
  val_fraction:    0.15
  seed:            42
  cache_images:    false

preprocessing:
  output_size:     [176, 208]   # [width, height]
  do_skull_strip:  true
  do_clahe:        true
  do_zscore:       true

augmentation:
  heavy:           false
  mixup_alpha:     0.4
  cutmix_alpha:    1.0
  use_mixup:       true
  use_cutmix:      false

model:
  visual_encoder:  "vit_base_patch16_224"
  text_encoder:    "emilyalsentzer/Bio_ClinicalBERT"
  embed_dim:       768
  num_classes:     4
  dropout:         0.1

training:
  epochs:          50
  batch_size:      64
  num_workers:     4
  use_weighted_sampler: true
  optimizer:
    name:          "adamw"
    lr:            3.0e-4
    weight_decay:  1.0e-4
    betas:         [0.9, 0.999]
    eps:           1.0e-8
  scheduler:
    name:          "cosine"
    warmup_epochs: 5
    min_lr:        1.0e-6

loss:
  lambda_haa:      0.4
  lambda_patch:    0.3
  lambda_slice:    0.5
  lambda_class:    0.2
  temperature:     0.07

output:
  checkpoint_dir:  "checkpoints/"
  log_dir:         "logs/"
  results_dir:     "results/"
  save_every:      5
  early_stop_patience: 10

seed:   42
device: "cuda"
